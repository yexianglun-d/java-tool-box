name: Maven Central Release

on:
  workflow_dispatch:
    inputs:
      publish_mode:
        description: "validated 只上传并等待校验；published 会自动发布到 Maven Central"
        required: true
        default: "validated"
        type: choice
        options:
          - validated
          - published

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Central Portal
    runs-on: ubuntu-latest
    environment: maven-central

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Run tests
        run: mvn -B -ntp test

      - name: Publish bundle
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          AUTO_PUBLISH=false
          if [ "${{ inputs.publish_mode }}" = "published" ]; then
            AUTO_PUBLISH=true
          fi

          mvn -B -ntp -Prelease,sign-artifacts,central-publish \
            -Dgpg.sign=true \
            -Dcentral.skipPublishing=false \
            -Dcentral.autoPublish="${AUTO_PUBLISH}" \
            -Dcentral.waitUntil="${{ inputs.publish_mode }}" \
            -DskipTests \
            deploy
