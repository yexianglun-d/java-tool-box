name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile default reactor
        run: mvn -B -ntp -DskipTests compile

      - name: Run default tests
        run: mvn -B -ntp test

      - name: Check public API compatibility
        run: >
          mvn -B -ntp -Papi-compat
          -pl under-utils-core,under-utils-http,under-utils-spring,under-utils-redis,under-utils-mybatis,under-utils-biz
          -am
          -DskipTests
          verify

      - name: Run integration tests
        run: mvn -B -ntp -Pintegration-tests -pl under-utils-test -am test
