under:
  utils:
    web:
      rate-limit:
        store: redis
      repeat-submit:
        store: redis
    redis:
      cache:
        enabled: true
        ttl: 5m
        null-ttl: 30s
        jitter: 5s
        cache-null: true
      logical-cache:
        enabled: true
        logical-ttl: 5m
        physical-ttl: 30m

samples:
  redis:
    address: redis://127.0.0.1:6379
    database: 0
    password:
