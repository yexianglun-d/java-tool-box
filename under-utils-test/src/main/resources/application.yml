spring:
  application:
    name: under-utils-test
  
  # MySQL 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/under_utils_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  
  # 自动执行建表脚本
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 5070

logging:
  level:
    root: INFO
    com.undernine.utils: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
