spring:
  application:
    name: under-utils-test

  # MyBatis 集成测试通过 Testcontainers 动态注入 datasource。
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 5070

logging:
  level:
    root: INFO
    com.undernine.utils: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
